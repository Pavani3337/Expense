<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MoneyFlow Tracker</title>

    <link rel="stylesheet"
          href="budgetstyle.css">

</head>

<body>

    <div class="tracker-container">

        <h1>💰 MoneyFlow Tracker</h1>

        <div class="balance-box">

            <h2>Total Balance</h2>

            <h1 id="totalBalance">
                ₹0
            </h1>

        </div>

        <div class="form-box">

            <input type="text"
                   id="expenseName"
                   placeholder="Expense Name">

            <input type="number"
                   id="expenseAmount"
                   placeholder="Amount">

            <select id="expenseCategory">

                <option value="">
                    Select Category
                </option>

                <option>
                    Food
                </option>

                <option>
                    Travel
                </option>

                <option>
                    Shopping
                </option>

                <option>
                    Education
                </option>

                <option>
                    Other
                </option>

            </select>

            <button onclick="addExpense()">
                Add Expense
            </button>

        </div>

        <div class="expense-list">

            <h2>Expense History</h2>

            <ul id="expenseHistory">

            </ul>

        </div>

    </div>

    <script src="budgetlogic.js"></script>

</body>

</html>
